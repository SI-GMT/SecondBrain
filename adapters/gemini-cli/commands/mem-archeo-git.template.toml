description = "Phase 3 of the triphasic archeo: reconstruct the Git history of an existing repo as dated archives, enriched by the topology and stack from Phases 0/1/2. Surfaces friction sequences (>=3 successive commits on the same theme) and cross-links derived atoms. Source archeo-git. AUTO-TRIGGER (without waiting for /mem-archeo-git) when the user says — 'do a Git retro of this project', 'reconstruct the history', 'archeo the commits'. Also invocable directly. Idempotent via (project, source_milestone, source_atom_type, source_atom_subject)."
prompt = '''
