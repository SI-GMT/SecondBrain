description = "Triphasic archeo orchestrator. Runs Phase 1 (organizational/decisional/functional context — mem-archeo-context), Phase 2 (technical stack — mem-archeo-stack), Phase 3 (Git history — mem-archeo-git) in sequence on a Git repo, sharing a single Phase 0 topology scan across them. AUTO-TRIGGER (without waiting for /mem-archeo) when the user says — 'do a full archeo of this project', 'reconstruct project context, stack and history', 'archeo on this repo'. Also invocable via /mem-archeo [repo-path] with options --skip-phase, --only-phase, --level, --since, --until, --window, --rescan, --dry-run, --no-confirm. Persists a topology snapshot in 99-meta/repo-topology/{slug}.md."
prompt = '''
{{PROCEDURE}}

---
Optional: path to the Git repo (default: CWD). Options: --project {slug}, --skip-phase context|stack|git, --only-phase context|stack|git, --level tags|releases|merges|commits, --since YYYY-MM-DD, --until YYYY-MM-DD, --window day|week|month, --depth N, --rescan, --dry-run, --no-confirm.
'''
