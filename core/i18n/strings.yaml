# SecondBrain — Localized strings
#
# Persistent user-facing strings written into the vault by the skills.
# The conversational surface (replies, questions, confirmations) is generated
# dynamically by the LLM in the user's language — it is NOT in this file.
#
# Only structural strings that end up persisted on disk live here:
#   - Section headers in the vault index (## Projects, ## Domains, ## Archives)
#   - Section headers in context.md / history.md skeletons
#   - Empty-state placeholders ("(none yet)")
#   - Standard error markers used in tags / frontmatter
#
# Resolution at runtime:
#   1. Read `language` from ~/.claude/memory-kit.json (or equivalent for the CLI)
#   2. Look up `<language>.<key>`; fall back to `en.<key>` if missing
#   3. Substitute in the generated content
#
# To add a language: copy the `en` block, translate values, keep keys identical.
# Bundled defaults: en, fr, es, de, ru.

